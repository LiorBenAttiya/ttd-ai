name: Backend — Build & Deploy

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

env:
  ACR_REGISTRY: acr-ttdai.azurecr.io
  IMAGE_NAME:   ttdai-api
  CA_NAME:      ttdai-api
  CA_RG:        rg-ttdai-prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies & run tests
        working-directory: backend
        run: |
          pip install -r requirements.txt
          # pytest tests/ -v   # uncomment when tests exist

      - name: Log in to Azure Container Registry
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }},${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Deploy to Azure Container Apps
        if: github.ref == 'refs/heads/main'
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName:              ${{ env.ACR_REGISTRY }}
          containerAppName:     ${{ env.CA_NAME }}
          resourceGroup:        ${{ env.CA_RG }}
          imageToDeploy:        ${{ env.ACR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          credentials:          ${{ secrets.AZURE_CREDENTIALS }}
