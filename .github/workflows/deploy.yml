name: Deploy TTD AI

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual trigger from GitHub UI

env:
  AZURE_WEBAPP_NAME: TTDAI
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  # ── 1. Type-check frontend ─────────────────────────────────────
  typecheck:
    name: TypeScript check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: tsc --noEmit
        run: npx tsc --noEmit

  # ── 2. Build & deploy frontend to GitHub Pages ────────────────
  deploy-frontend:
    name: Frontend to GitHub Pages
    runs-on: ubuntu-latest
    needs: typecheck
    permissions:
      contents: write
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Create .env.production
        run: echo "VITE_API_URL=${{ secrets.VITE_API_URL }}" > .env.production

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: frontend/dist

  # ── 3. Deploy backend + wa-bridge to Azure App Service ────────
  deploy-backend:
    name: Backend + WA Bridge to Azure
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      # deploy-pkg layout (Oryx needs requirements.txt at root):
      #   app/             FastAPI app
      #   requirements.txt Python deps
      #   wa-bridge/       Node.js WA bridge (started by FastAPI lifespan)
      - name: Prepare deployment package
        run: |
          mkdir -p deploy-pkg
          cp -r backend/. deploy-pkg/
          # Remove local Windows venv — Oryx creates /antenv on Azure
          rm -rf deploy-pkg/venv deploy-pkg/__pycache__
          # Include wa-bridge source (node_modules installed at runtime by FastAPI)
          cp -r wa-bridge deploy-pkg/wa-bridge

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: deploy-pkg
